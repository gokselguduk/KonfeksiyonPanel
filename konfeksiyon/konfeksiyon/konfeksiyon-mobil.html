<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Konfeksiyon Paneli · Simteks</title>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="erp-config.js"></script>
<style>
:root{--bg:#0f1117;--surface:#181c27;--surface2:#1e2436;--surface3:#252c3f;--border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);--text:#e8eaf0;--text2:#9aa3b8;--text3:#5a6280;--accent:#6366f1;--accent2:#818cf8;--green:#10b981;--amber:#f59e0b;--red:#ef4444;--cyan:#06b6d4;--violet:#8b5cf6;--pink:#ec4899}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100dvh;overflow-x:hidden}
#login-screen{min-height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem 1.5rem;background:radial-gradient(ellipse at 50% 0%,rgba(99,102,241,.15) 0%,transparent 60%)}
.login-logo{width:64px;height:64px;background:linear-gradient(135deg,var(--accent),var(--violet));border-radius:20px;display:flex;align-items:center;justify-content:center;font-size:28px;margin-bottom:1.5rem;box-shadow:0 8px 32px rgba(99,102,241,.3)}
.login-title{font-size:22px;font-weight:700;margin-bottom:4px}
.login-sub{font-size:13px;color:var(--text3);margin-bottom:2rem}
.login-card{width:100%;max-width:360px;background:var(--surface);border:1px solid var(--border2);border-radius:16px;padding:1.5rem}
.login-label{font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--text3);display:block;margin-bottom:6px;margin-top:14px}
.login-label:first-of-type{margin-top:0}
.login-input{width:100%;background:var(--surface2);border:1px solid var(--border2);border-radius:10px;color:var(--text);padding:13px 14px;font-size:15px;outline:none;transition:border-color .2s}
.login-input:focus{border-color:var(--accent)}
.login-input::placeholder{color:var(--text3)}
.login-btn{width:100%;margin-top:1.25rem;background:linear-gradient(135deg,var(--accent),var(--violet));border:none;border-radius:10px;color:#fff;font-size:14px;font-weight:700;padding:14px;cursor:pointer;transition:opacity .2s,transform .1s}
.login-btn:active{transform:scale(.98);opacity:.85}
.login-btn:disabled{opacity:.5;cursor:not-allowed}
.login-err{display:none;margin-top:10px;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);border-radius:10px;padding:10px 12px;font-size:12px;color:var(--red)}
#topbar{display:none;position:sticky;top:0;z-index:100;background:var(--surface);border-bottom:1px solid var(--border);padding:0 16px;height:54px;align-items:center;gap:10px}
.topbar-logo{width:30px;height:30px;background:linear-gradient(135deg,var(--accent),var(--violet));border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
.topbar-title{font-size:14px;font-weight:700;flex:1}
.logout-btn{background:none;border:1px solid var(--border2);border-radius:8px;color:var(--text3);padding:5px 10px;font-size:11px;cursor:pointer}
#app{display:none}
.tab-bar{display:flex;border-bottom:1px solid var(--border);background:var(--surface);overflow-x:auto;scrollbar-width:none;position:sticky;top:54px;z-index:99}
.tab-bar::-webkit-scrollbar{display:none}
.tab-btn{flex-shrink:0;padding:12px 16px;font-size:11px;font-weight:700;letter-spacing:.4px;text-transform:uppercase;color:var(--text3);background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;transition:all .2s;white-space:nowrap}
.tab-btn.active{color:var(--accent2);border-bottom-color:var(--accent)}
.content{padding:14px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:10px}
.card-head{padding:12px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.card-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.card-title{font-size:11px;font-weight:800;letter-spacing:.3px;text-transform:uppercase}
.card-count{font-size:10px;color:var(--text3);margin-left:auto}
.siparis-item{padding:13px 14px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .15s;display:flex;align-items:flex-start;gap:10px}
.siparis-item:last-child{border-bottom:none}
.siparis-item:active{background:var(--surface2)}
.siparis-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;margin-top:3px}
.siparis-info{flex:1;min-width:0}
.siparis-no{font-size:13px;font-weight:700;margin-bottom:2px}
.siparis-firma{font-size:11px;color:var(--text2);margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.siparis-tags{display:flex;gap:4px;flex-wrap:wrap}
.tag{font-size:9px;font-weight:700;letter-spacing:.4px;text-transform:uppercase;padding:2px 7px;border-radius:999px}
.tag-green{background:rgba(16,185,129,.12);color:var(--green)}
.tag-amber{background:rgba(245,158,11,.12);color:var(--amber)}
.tag-red{background:rgba(239,68,68,.12);color:var(--red)}
.tag-blue{background:rgba(99,102,241,.12);color:var(--accent2)}
.tag-gray{background:rgba(255,255,255,.06);color:var(--text3)}
.tag-cyan{background:rgba(6,182,212,.12);color:var(--cyan)}
.siparis-right{text-align:right;flex-shrink:0}
.siparis-adet{font-size:17px;font-weight:800}
.siparis-adet-label{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.4px}
#detay-modal{display:none;position:fixed;inset:0;z-index:200}
.modal-backdrop{position:absolute;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(4px)}
.modal-sheet{position:absolute;bottom:0;left:0;right:0;background:var(--surface);border-radius:22px 22px 0 0;max-height:92dvh;overflow-y:auto;overscroll-behavior:contain;animation:slideUp .3s cubic-bezier(.32,.72,0,1)}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-handle{width:36px;height:4px;background:var(--border2);border-radius:2px;margin:10px auto 0}
.modal-head{padding:14px 16px 10px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--surface);z-index:10}
.modal-sno{font-size:17px;font-weight:800;margin-bottom:3px}
.modal-firma{font-size:12px;color:var(--text2)}
.modal-tabs{display:flex;gap:5px;padding:10px 14px;overflow-x:auto;scrollbar-width:none;border-bottom:1px solid var(--border);background:var(--surface);position:sticky;top:76px;z-index:9}
.modal-tabs::-webkit-scrollbar{display:none}
.modal-tab{padding:6px 13px;border-radius:999px;font-size:11px;font-weight:700;background:var(--surface2);border:1px solid var(--border);color:var(--text3);cursor:pointer;white-space:nowrap;transition:all .2s}
.modal-tab.active{background:var(--accent);border-color:var(--accent);color:#fff}
.modal-body{padding:14px}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.stat-box{background:var(--surface2);border:1px solid var(--border);border-radius:11px;padding:11px}
.stat-val{font-size:22px;font-weight:800;line-height:1;margin-bottom:3px}
.stat-lbl{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;font-weight:600}
.info-row{display:flex;justify-content:space-between;align-items:flex-start;padding:9px 0;border-bottom:1px solid var(--border);gap:8px}
.info-row:last-child{border-bottom:none}
.info-key{font-size:11px;color:var(--text3);font-weight:600;flex-shrink:0}
.info-val{font-size:11px;color:var(--text);text-align:right}
.bar-row{display:flex;align-items:center;gap:7px;margin-bottom:6px}
.bar-label{font-size:9px;color:var(--text3);width:44px;flex-shrink:0;font-weight:700;letter-spacing:.3px;text-transform:uppercase}
.bar-track{flex:1;height:5px;background:var(--surface3);border-radius:3px;overflow:hidden}
.bar-fill{height:100%;border-radius:3px;transition:width .5s}
.bar-val{font-size:10px;font-weight:700;width:28px;text-align:right;flex-shrink:0}
.form-section{background:var(--surface2);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:10px}
.form-section-head{padding:11px 13px;border-bottom:1px solid var(--border);font-size:11px;font-weight:800;letter-spacing:.6px;text-transform:uppercase;display:flex;align-items:center;gap:7px}
.form-section-body{padding:12px 13px}
.field-label{font-size:9px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--text3);display:block;margin-bottom:4px}
.field-input{width:100%;background:var(--surface);border:1px solid var(--border2);border-radius:8px;color:var(--text);padding:10px 11px;font-size:14px;outline:none;margin-bottom:10px;transition:border-color .2s;font-family:inherit}
.field-input:focus{border-color:var(--accent)}
.field-input::placeholder{color:var(--text3);font-size:12px}
.field-input:last-child{margin-bottom:0}
.field-select{width:100%;background:var(--surface);border:1px solid var(--border2);border-radius:8px;color:var(--text);padding:10px 11px;font-size:13px;outline:none;margin-bottom:10px;-webkit-appearance:none;font-family:inherit}
.field-textarea{width:100%;background:var(--surface);border:1px solid var(--border2);border-radius:8px;color:var(--text);padding:10px 11px;font-size:13px;outline:none;margin-bottom:10px;resize:vertical;min-height:64px;font-family:inherit}
.field-textarea:focus{border-color:var(--accent)}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.field-checkbox{display:flex;align-items:center;gap:8px;margin-bottom:10px;cursor:pointer}
.field-checkbox input{width:16px;height:16px;accent-color:var(--accent);cursor:pointer;flex-shrink:0}
.field-checkbox span{font-size:11px;font-weight:600;color:var(--text2)}
.kalem-girdi{background:var(--surface);border:1px solid var(--border2);border-radius:10px;padding:10px 12px;margin-bottom:8px}
.kalem-girdi:last-child{margin-bottom:0}
.kalem-girdi-ad{font-size:12px;font-weight:700;margin-bottom:2px}
.kalem-girdi-sub{font-size:10px;color:var(--text3);margin-bottom:8px}
.kalem-girdi-row{display:flex;align-items:center;gap:6px;margin-bottom:6px}
.kalem-girdi-row:last-child{margin-bottom:0}
.kalem-girdi-lbl{font-size:9px;font-weight:700;color:var(--text3);text-transform:uppercase;width:64px;flex-shrink:0}
.kalem-girdi-input{flex:1;background:var(--surface2);border:1px solid var(--border2);border-radius:7px;color:var(--text);padding:7px 9px;font-size:13px;outline:none;text-align:center;font-family:inherit}
.kalem-girdi-input:focus{border-color:var(--accent)}
.kalem-girdi-sum{font-size:11px;font-weight:800;width:40px;text-align:right;flex-shrink:0}
.aks-grid{display:grid;grid-template-columns:80px 1fr 1fr 1fr;gap:5px;align-items:center;margin-bottom:6px}
.aks-lbl{font-size:10px;font-weight:700;color:var(--text2)}
.aks-input{background:var(--surface);border:1px solid var(--border2);border-radius:7px;color:var(--text);padding:7px 6px;font-size:13px;outline:none;text-align:center;width:100%;font-family:inherit}
.aks-kalan{font-size:11px;font-weight:800;text-align:center;padding:7px 4px;border-radius:7px}
.save-btn{width:100%;border:none;border-radius:11px;color:#fff;font-size:13px;font-weight:800;padding:13px;cursor:pointer;margin-top:8px;transition:opacity .2s,transform .1s;letter-spacing:.4px}
.save-btn:active{transform:scale(.98);opacity:.85}
.save-btn:disabled{opacity:.4;cursor:not-allowed}
.kpi-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;margin-bottom:10px}
.kpi-box{background:var(--surface);border:1px solid var(--border);border-radius:11px;padding:11px 8px;text-align:center}
.kpi-val{font-size:21px;font-weight:800}
.kpi-lbl{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.4px;margin-top:2px}
.sec-title{font-size:10px;font-weight:800;letter-spacing:.8px;text-transform:uppercase;color:var(--text3);margin-bottom:7px;margin-top:2px}
.sel-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:13px 14px;margin-bottom:10px}
.giris-subtab-bar{display:flex;background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:10px}
.giris-subtab-btn{flex:1;padding:10px 4px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.3px;color:var(--text3);background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;transition:all .2s;white-space:nowrap}
.giris-subtab-btn.active{color:var(--accent2);background:var(--surface2);border-bottom-color:var(--accent)}
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;gap:10px;color:var(--text3)}
.spinner{width:32px;height:32px;border:3px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:40px 20px;color:var(--text3);font-size:13px}
.empty .icon{font-size:30px;margin-bottom:8px}
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--surface3);border:1px solid var(--border2);color:var(--text);padding:10px 18px;border-radius:12px;font-size:13px;font-weight:600;z-index:999;display:none;box-shadow:0 8px 24px rgba(0,0,0,.4);white-space:nowrap;max-width:90vw;text-align:center}
#toast.show{display:block;animation:toastIn .3s ease}
@keyframes toastIn{from{opacity:0;transform:translate(-50%,10px)}to{opacity:1;transform:translate(-50%,0)}}
.filter-row{display:flex;gap:6px;margin-bottom:10px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px}
.filter-row::-webkit-scrollbar{display:none}
.filter-chip{flex-shrink:0;padding:6px 13px;border-radius:999px;font-size:11px;font-weight:700;border:1px solid var(--border2);background:var(--surface2);color:var(--text3);cursor:pointer;transition:all .2s}
.filter-chip.active{background:var(--accent);border-color:var(--accent);color:#fff}
.log-item{padding:10px 14px;border-bottom:1px solid var(--border)}
.log-item:last-child{border-bottom:none}
.log-islem{font-size:10px;font-weight:800;color:var(--accent2);margin-bottom:2px;text-transform:uppercase;letter-spacing:.4px}
.log-not{font-size:11px;color:var(--text2);margin-bottom:3px}
.log-meta{font-size:10px;color:var(--text3)}
.iki-kal-box{background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.25);border-radius:8px;padding:8px 10px;margin-bottom:6px}
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-logo">🧵</div>
  <div class="login-title">Konfeksiyon Paneli</div>
  <div class="login-sub">Simteks Tekstil · Üretim Takip</div>
  <div class="login-card">
    <label class="login-label">Kullanıcı Adı</label>
    <input id="l-user" class="login-input" type="text" placeholder="kullanici" autocomplete="username" onkeydown="if(event.key==='Enter')document.getElementById('l-pass').focus()">
    <label class="login-label">Şifre</label>
    <input id="l-pass" class="login-input" type="password" placeholder="••••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="login-btn" id="login-btn" onclick="doLogin()">Giriş Yap</button>
    <div class="login-err" id="login-err"></div>
  </div>
</div>

<div id="topbar">
  <div class="topbar-logo">🧵</div>
  <div class="topbar-title">Konfeksiyon</div>
  <div style="font-size:11px;color:var(--text3);flex:1;text-align:right" id="user-info"></div>
  <button class="logout-btn" onclick="doLogout()">Çıkış</button>
</div>

<div id="app">
  <div class="tab-bar" id="main-tab-bar">
    <button class="tab-btn active" onclick="switchTab('siparisler',0)">📋 Siparişler</button>
    <button class="tab-btn" onclick="switchTab('giris',1)">✏️ Veri Girişi</button>
    <button class="tab-btn" onclick="switchTab('log',2)">📌 Log</button>
  </div>

  <div id="tab-siparisler" class="content">
    <div class="kpi-row" id="kpi-row"></div>
    <div class="filter-row">
      <button class="filter-chip active" onclick="setFilter('HEPSI',this)">Tümü</button>
      <button class="filter-chip" onclick="setFilter('SIMTEKS',this)">Simteks</button>
      <button class="filter-chip" onclick="setFilter('BEKLEMEDE',this)">Bekleyen</button>
      <button class="filter-chip" onclick="setFilter('URETIMDE',this)">Üretimdeki</button>
    </div>
    <div class="sec-title">Aktif Siparişler</div>
    <div class="card" id="siparis-liste-card">
      <div class="loading"><div class="spinner"></div><div>Yükleniyor…</div></div>
    </div>
  </div>

  <div id="tab-giris" class="content" style="display:none">
    <div class="sel-card">
      <div class="sec-title" style="margin-bottom:7px">Sipariş Seç</div>
      <select class="field-select" id="giris-siparis-sel" onchange="girisLoadSiparis()" style="margin-bottom:0">
        <option value="">— Sipariş seçin —</option>
      </select>
    </div>
    <div id="giris-sub-tabs" style="display:none">
      <div class="giris-subtab-bar">
        <button class="giris-subtab-btn active" onclick="switchGirisTab('kesim',this)">✂️ Kesim</button>
        <button class="giris-subtab-btn" onclick="switchGirisTab('dikim',this)">🧵 Dikim</button>
        <button class="giris-subtab-btn" onclick="switchGirisTab('kk',this)">🔍 Kalite</button>
        <button class="giris-subtab-btn" onclick="switchGirisTab('koli',this)">📦 Koli</button>
        <button class="giris-subtab-btn" onclick="switchGirisTab('kapama',this)">🏁 Kapama</button>
      </div>
    </div>
    <div id="giris-form-area">
      <div class="empty"><div class="icon">📝</div>Yukarıdan sipariş seçin</div>
    </div>
  </div>

  <div id="tab-log" class="content" style="display:none">
    <div class="sel-card">
      <div class="sec-title" style="margin-bottom:7px">Sipariş Seç</div>
      <select class="field-select" id="log-siparis-sel" onchange="logLoadSiparis()" style="margin-bottom:0">
        <option value="">— Sipariş seçin —</option>
      </select>
    </div>
    <div id="log-area"><div class="empty"><div class="icon">📌</div>Yukarıdan sipariş seçin</div></div>
  </div>
</div>

<div id="detay-modal">
  <div class="modal-backdrop" onclick="closeModal()"></div>
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-head">
      <div class="modal-sno" id="m-sno">—</div>
      <div class="modal-firma" id="m-firma">—</div>
      <div style="display:flex;gap:5px;margin-top:7px;flex-wrap:wrap" id="m-tags"></div>
    </div>
    <div class="modal-tabs">
      <button class="modal-tab active" onclick="modalTab('ozet',this)">Özet</button>
      <button class="modal-tab" onclick="modalTab('kalemler',this)">Kalemler</button>
      <button class="modal-tab" onclick="modalTab('konfeksiyon',this)">Konfeksiyon</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<div id="toast"></div>

<script>
let sb=null,currentUser=null,siparisler=[],selectedSiparis=null;
let kdCache={},girisSeciliId=null,girisKd={},girisKalemler=[],girisTab='kesim';
let aktifFilter='HEPSI',simteksIds=new Set();

function initSB(){const c=window.__ERP_SUPABASE;if(!c||!c.url||!c.anonKey){showErr('erp-config.js yapılandırılmamış.');return false;}sb=supabase.createClient(c.url.trim(),c.anonKey.trim());return true;}

async function doLogin(){
  const u=document.getElementById('l-user').value.trim();
  const p=document.getElementById('l-pass').value;
  const btn=document.getElementById('login-btn');
  document.getElementById('login-err').style.display='none';
  if(!u||!p){showLoginErr('Kullanıcı adı ve şifre giriniz.');return;}
  if(!sb){showLoginErr('Supabase bağlantısı kurulamadı.');return;}
  btn.disabled=true;btn.textContent='Giriş yapılıyor…';
  try{
    const{data,error}=await sb.rpc('erp_login',{p_username:u,p_password:p});
    if(error)throw error;
    let result=data;
    if(typeof result==='string'){try{result=JSON.parse(result);}catch{}}
    if(!result||result.ok===false){showLoginErr(result?.err||'Kullanıcı adı veya şifre yanlış.');btn.disabled=false;btn.textContent='Giriş Yap';return;}
    const user=result.user||result;
    if(!user||!user.username){showLoginErr('Giriş başarısız.');btn.disabled=false;btn.textContent='Giriş Yap';return;}
    const allowed=normalizeAllowed(user.allowed_modes);
    const isAdmin=String(user.role||'').toLowerCase()==='admin';
    if(!isAdmin&&!allowed.includes('KONFEKSIYON')){showLoginErr('Konfeksiyon yetkisi yok.');btn.disabled=false;btn.textContent='Giriş Yap';return;}
    currentUser={...user,allowed};
    localStorage.setItem('konf_session',JSON.stringify({user:currentUser,ts:Date.now()}));
    startApp();
  }catch(e){showLoginErr('Bağlantı hatası: '+(e.message||e));btn.disabled=false;btn.textContent='Giriş Yap';}
}
function normalizeAllowed(r){if(!r)return[];if(Array.isArray(r))return r;try{const j=JSON.parse(r);return Array.isArray(j)?j:[];}catch{return[];}}
function showLoginErr(m){const el=document.getElementById('login-err');el.textContent=m;el.style.display='block';}
function doLogout(){localStorage.removeItem('konf_session');currentUser=null;siparisler=[];document.getElementById('app').style.display='none';document.getElementById('topbar').style.display='none';document.getElementById('login-screen').style.display='flex';}
function tryRestoreSession(){try{const r=localStorage.getItem('konf_session');if(!r)return false;const s=JSON.parse(r);if(!s.user||!s.ts)return false;if(Date.now()-s.ts>8*60*60*1000){localStorage.removeItem('konf_session');return false;}currentUser=s.user;return true;}catch{return false;}}

async function startApp(){
  document.getElementById('login-screen').style.display='none';
  document.getElementById('topbar').style.display='flex';
  document.getElementById('app').style.display='block';
  document.getElementById('user-info').textContent=currentUser.display_name||currentUser.username;
  await loadSiparisler();
}

async function loadSiparisler(){
  try{
    const{data,error}=await sb.from('siparisler').select('*').order('created_at',{ascending:false});
    if(error)throw error;
    siparisler=(data||[]).filter(s=>s.durum!=='TAMAMLANDI');
    siparisler.sort((a,b)=>compareSno(a.sno,b.sno));
    simteksIds=new Set(siparisler.filter(s=>isSimteks(s)).map(s=>s.id));
    renderSiparisler();
    populateSelects();
  }catch(e){document.getElementById('siparis-liste-card').innerHTML=`<div class="empty"><div class="icon">⚠️</div>Yüklenemedi: ${e.message}</div>`;}
}

function isSimteks(s){const f=String(s.firma||'').toLowerCase();return f.includes('simteks')||!s.firma||f==='';}

function setFilter(f,el){aktifFilter=f;document.querySelectorAll('.filter-chip').forEach(c=>c.classList.remove('active'));el.classList.add('active');renderSiparisler();}

function renderSiparisler(){
  let liste=siparisler;
  if(aktifFilter==='SIMTEKS')liste=siparisler.filter(s=>simteksIds.has(s.id));
  else if(aktifFilter==='BEKLEMEDE')liste=siparisler.filter(s=>!s.durum||s.durum==='BEKLEMEDE');
  else if(aktifFilter==='URETIMDE')liste=siparisler.filter(s=>['ÜRETİMDE','DEVAM'].includes(s.durum));
  const aktif=siparisler.filter(s=>['ÜRETİMDE','DEVAM'].includes(s.durum));
  const bek=siparisler.filter(s=>!s.durum||s.durum==='BEKLEMEDE');
  document.getElementById('kpi-row').innerHTML=`
    <div class="kpi-box"><div class="kpi-val" style="color:var(--accent2)">${siparisler.length}</div><div class="kpi-lbl">Toplam</div></div>
    <div class="kpi-box"><div class="kpi-val" style="color:var(--green)">${aktif.length}</div><div class="kpi-lbl">Aktif</div></div>
    <div class="kpi-box"><div class="kpi-val" style="color:var(--amber)">${bek.length}</div><div class="kpi-lbl">Bekleyen</div></div>`;
  if(!liste.length){document.getElementById('siparis-liste-card').innerHTML=`<div class="empty"><div class="icon">📭</div>Sipariş bulunamadı</div>`;return;}
  let html=`<div class="card-head"><div class="card-dot" style="background:var(--accent)"></div><div class="card-title">${aktifFilter==='SIMTEKS'?'Simteks Siparişleri':'Aktif Siparişler'}</div><div class="card-count">${liste.length} sipariş</div></div>`;
  liste.forEach(s=>{html+=sipItem(s);});
  document.getElementById('siparis-liste-card').innerHTML=html;
}

function sipItem(s){
  const k=parseKalemler(s);
  const adet=parseInt(s.miktar)||k.reduce((a,x)=>a+(parseInt(x.miktar)||0),0);
  const ozet=k.length?k.slice(0,2).map(x=>x.ad||x.kod||'').filter(Boolean).join(', ')+(k.length>2?` +${k.length-2}`:''):'—';
  const sTg=simteksIds.has(s.id)?'<span class="tag tag-cyan">Simteks</span>':'<span class="tag tag-gray">Fason</span>';
  return `<div class="siparis-item" onclick="openSiparis(${s.id})">
    <div class="siparis-dot" style="background:${dColor(s.durum)}"></div>
    <div class="siparis-info">
      <div class="siparis-no">${esc(s.sno||'—')}</div>
      <div class="siparis-firma">${esc(s.firma||'—')}</div>
      <div class="siparis-tags">${dTag(s.durum)}${sTg}${s.ttarih?`<span class="tag tag-gray">T:${s.ttarih}</span>`:''}</div>
    </div>
    <div class="siparis-right"><div class="siparis-adet">${adet||'—'}</div><div class="siparis-adet-label">adet</div></div>
  </div>`;
}

function openSiparis(id){
  selectedSiparis=siparisler.find(s=>s.id==id);if(!selectedSiparis)return;
  document.getElementById('m-sno').textContent=selectedSiparis.sno||'—';
  document.getElementById('m-firma').textContent=selectedSiparis.firma||'—';
  document.getElementById('m-tags').innerHTML=dTag(selectedSiparis.durum)+(simteksIds.has(selectedSiparis.id)?'<span class="tag tag-cyan">Simteks</span>':'<span class="tag tag-gray">Fason</span>');
  document.getElementById('detay-modal').style.display='block';
  document.querySelectorAll('.modal-tab').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.modal-tab')[0].classList.add('active');
  renderModalTab('ozet');
}
function closeModal(){document.getElementById('detay-modal').style.display='none';selectedSiparis=null;}
function modalTab(t,el){document.querySelectorAll('.modal-tab').forEach(b=>b.classList.remove('active'));el.classList.add('active');renderModalTab(t);}

function populateSelects(){
  const opts=siparisler.map(s=>`<option value="${s.id}">${esc(s.sno||'—')} · ${esc(s.firma||'')}</option>`).join('');
  const pre='<option value="">— Sipariş seçin —</option>';
  document.getElementById('giris-siparis-sel').innerHTML=pre+opts;
  document.getElementById('log-siparis-sel').innerHTML=pre+opts;
}

  const id=document.getElementById('giris-siparis-sel').value;

  </div></div>
  ${k.length?`<div class="form-section"><div class="form-section-head" style="color:var(--amber)">🔍 Beden Bazlı KK</div><div class="form-section-body">
  ${k.map((x,i)=>{const kk=kd['kalem_'+i]||{};const dik=parseInt(kk.dikilen||0);const ikiTop=parseInt(kk.iki_kalite||0);const hat=ikiTop+parseInt(kk.tamir||0)+parseInt(kk.imha||0);const fp=dik>0?Math.round(hat/dik*100):0;
  return `<div class="kalem-girdi"><div class="kalem-girdi-ad">${esc(x.ad||x.kod||'Kalem '+(i+1))}</div><div class="kalem-girdi-sub">${esc([x.renk,x.ebat||x.olcu].filter(Boolean).join(' · ')||'—')} · Dikilen: ${dik} · Fire: %${fp}</div>
  <div class="kalem-girdi-row"><span class="kalem-girdi-lbl" style="color:var(--green)">+ KK Geçen</span><input class="kalem-girdi-input" type="number" min="0" placeholder="+ekle" id="k-kk_gecen-${i}"><span class="kalem-girdi-sum" style="color:var(--green)">∑${kk.kk_gecen||0}</span></div>
  <div class="iki-kal-box"><div style="font-size:9px;font-weight:800;color:var(--amber);margin-bottom:6px">2. KALİTE ∑${ikiTop}</div>
  <div class="field-row" style="margin-bottom:6px"><div><label class="field-label">Sebep</label><select class="field-select" id="kk2-sebep-${i}" style="margin-bottom:0;padding:7px 8px;font-size:12px"><option value="dokuma">Dokuma</option><option value="leke">Leke</option><option value="ebat">Ebat</option><option value="dikis">Dikiş</option><option value="diger">Diğer</option></select></div>
  <div><label class="field-label">Adet</label><input class="field-input" type="number" min="0" placeholder="0" id="kk2-adet-${i}" style="margin-bottom:0"></div></div>
  <button onclick="ikiKaliteEkle(${i})" style="width:100%;background:var(--amber);border:none;border-radius:7px;color:#fff;font-size:11px;font-weight:800;padding:8px;cursor:pointer">+ 2. Kalite Ekle</button></div>
  <div class="kalem-girdi-row"><span class="kalem-girdi-lbl" style="color:var(--cyan)">+ Tamire</span><input class="kalem-girdi-input" type="number" min="0" placeholder="+ekle" id="k-tamir-${i}"><span class="kalem-girdi-sum" style="color:var(--cyan)">∑${kk.tamir||0}</span></div>
  <div class="kalem-girdi-row"><span class="kalem-girdi-lbl" style="color:var(--red)">+ İmha</span><input class="kalem-girdi-input" type="number" min="0" placeholder="+ekle" id="k-imha-${i}"><span class="kalem-girdi-sum" style="color:var(--red)">∑${kk.imha||0}</span></div></div>`;}).join('')}
  </div></div>`:''}
  <button class="save-btn" style="background:var(--amber)" onclick="girisKaydet('kk')">💾 KALİTE KONTROL KAYDET</button>`;
}

function renderKoliForm(){
  const kd=girisKd,k=girisKalemler;
  return `<div class="form-section"><div class="form-section-head" style="color:var(--green)">📦 Koli Bilgileri</div><div class="form-section-body">
    <div class="field-row"><div><label class="field-label">Koli Tarihi</label><input class="field-input" type="date" id="kf-koli-tarih" value="${kd.koli_tarih||''}"></div>
    <div><label class="field-label">Toplam Koli Sayısı</label><input class="field-input" type="number" id="kf-koli-sayi" placeholder="0" value="${kd.koli_sayi||''}"></div></div>
    <div class="field-row"><div><label class="field-label">Koli Başı Adet</label><input class="field-input" type="number" id="kf-koli-basi-adet" placeholder="0" value="${kd.koli_basi_adet||''}"></div>
    <div><label class="field-label">Ort. Koli Ağırlığı (kg)</label><input class="field-input" type="number" id="kf-koli-kg" placeholder="0.0" value="${kd.koli_kg||''}"></div></div>
    <label class="field-label">Koli / Etiket Notu</label><textarea class="field-textarea" id="kf-koli-not" placeholder="Not...">${kd.koli_not||''}</textarea>
  </div></div>
  ${k.length?`<div class="form-section"><div class="form-section-head" style="color:var(--green)">📦 Beden Bazlı Koli</div><div class="form-section-body">
  ${k.map((x,i)=>{const kk=kd['kalem_'+i]||{};return `<div class="kalem-girdi"><div class="kalem-girdi-ad">${esc(x.ad||x.kod||'Kalem '+(i+1))}</div><div class="kalem-girdi-sub">${esc([x.renk,x.ebat||x.olcu].filter(Boolean).join(' · ')||'—')} · KK Geçen: ${kk.kk_gecen||0}</div>
  <div class="kalem-girdi-row"><span class="kalem-girdi-lbl">+ Kolide</span><input class="kalem-girdi-input" type="number" min="0" placeholder="+adet" id="k-kolide-${i}"><span class="kalem-girdi-sum" style="color:var(--green)">∑${kk.kolide||0}</span></div></div>`;}).join('')}
  </div></div>`:''}
  <button class="save-btn" style="background:var(--green)" onclick="girisKaydet('koli')">💾 KOLİ BİLGİLERİNİ KAYDET</button>`;
}

function renderKapamaForm(){
  const kd=girisKd,k=girisKalemler;
  const top=k.reduce((a,x)=>a+(parseInt(x.miktar)||0),0);
  let tK=0,tD=0,tKK=0,tKol=0,tH=0;
  k.forEach((_,i)=>{const ki=kd['kalem_'+i]||{};tK+=parseInt(ki.kesilen||0)||0;tD+=parseInt(ki.dikilen||0)||0;tKK+=parseInt(ki.kk_gecen||0)||0;tKol+=parseInt(ki.kolide||0)||0;tH+=(parseInt(ki.iki_kalite||0)||0)+(parseInt(ki.tamir||0)||0)+(parseInt(ki.imha||0)||0);});
  const p=v=>top>0?Math.min(100,Math.round(v/top*100)):0;
  const sip=siparisler.find(s=>s.id==girisSeciliId)||{};
  return `<div class="form-section"><div class="form-section-head" style="color:var(--accent2)">📊 Üretim Özeti</div><div class="form-section-body">
    <div class="stat-grid" style="grid-template-columns:1fr 1fr;gap:8px;margin-bottom:0">
      <div class="stat-box"><div class="stat-val" style="color:var(--text)">${top}</div><div class="stat-lbl">Sipariş</div></div>
      <div class="stat-box"><div class="stat-val" style="color:var(--violet);font-size:18px">${tK}<span style="font-size:11px"> %${p(tK)}</span></div><div class="stat-lbl">Kesilen</div></div>
      <div class="stat-box"><div class="stat-val" style="color:var(--pink);font-size:18px">${tD}<span style="font-size:11px"> %${p(tD)}</span></div><div class="stat-lbl">Dikilen</div></div>
      <div class="stat-box"><div class="stat-val" style="color:var(--amber);font-size:18px">${tKK}<span style="font-size:11px"> %${p(tKK)}</span></div><div class="stat-lbl">KK Geçen</div></div>
      <div class="stat-box"><div class="stat-val" style="color:var(--green);font-size:18px">${tKol}<span style="font-size:11px"> %${p(tKol)}</span></div><div class="stat-lbl">Kolide</div></div>
      <div class="stat-box"><div class="stat-val" style="color:var(--red)">${tH}</div><div class="stat-lbl">Hatalı/Fire</div></div>
    </div>
  </div></div>
  <div class="form-section"><div class="form-section-head" style="color:var(--accent2)">🏁 Kapama Bilgileri</div><div class="form-section-body">
    <label class="field-label">Kapama Tarihi</label><input class="field-input" type="date" id="kf-kapama-tarih" value="${kd.kapama_tarih||new Date().toISOString().slice(0,10)}">
    <label class="field-label">Kapama Notu</label><textarea class="field-textarea" id="kf-kapama-not" placeholder="Genel üretim notu...">${kd.kapama_not||''}</textarea>
  </div></div>
  <div class="form-section"><div class="form-section-head" style="color:var(--accent2)">🔄 Sipariş Durumu</div><div class="form-section-body">
    <label class="field-label">Durum Güncelle</label>
    <select class="field-select" id="kf-durum">
      <option value="BEKLEMEDE" ${sip.durum==='BEKLEMEDE'?'selected':''}>⏳ Beklemede</option>
      <option value="ÜRETİMDE" ${sip.durum==='ÜRETİMDE'?'selected':''}>⚡ Üretimdede</option>
      <option value="DEVAM" ${sip.durum==='DEVAM'?'selected':''}>▶️ Devam</option>
      <option value="İPTAL" ${sip.durum==='İPTAL'?'selected':''}>❌ İptal</option>
    </select>
    <button class="save-btn" onclick="durumGuncelle()" style="background:var(--accent);margin-top:0">🔄 Durumu Güncelle</button>
  </div></div>
  <button class="save-btn" style="background:var(--accent2)" onclick="girisKaydet('kapama')">💾 KAPAMA BİLGİSİNİ KAYDET</button>`;
}

function ikiKaliteEkle(i){
  const sebep=document.getElementById('kk2-sebep-'+i)?.value||'diger';
  const adet=parseInt(document.getElementById('kk2-adet-'+i)?.value||0)||0;
  if(!adet){showToast('Adet giriniz');return;}
  if(!girisKd['kalem_'+i])girisKd['kalem_'+i]={};
  const kk=girisKd['kalem_'+i];
  if(!kk.iki_kalite_detay)kk.iki_kalite_detay={};
  kk.iki_kalite_detay[sebep]=(parseInt(kk.iki_kalite_detay[sebep]||0)||0)+adet;
  kk.iki_kalite=Object.values(kk.iki_kalite_detay).reduce((a,v)=>a+(parseInt(v)||0),0);
  if(document.getElementById('kk2-adet-'+i))document.getElementById('kk2-adet-'+i).value='';
  showToast('✅ 2. Kalite eklendi: '+sebep+' +'+adet);
  renderGirisTab();
}

async function girisKaydet(tip){
  if(!girisSeciliId)return;
  const btn=event.currentTarget;btn.disabled=true;btn.textContent='Kaydediliyor…';
  try{
    const kd=girisKd,k=girisKalemler;
    const gv=id=>{const el=document.getElementById(id);return el?el.value:'';};
    const gi=id=>parseInt(gv(id)||0)||0;
    const gc=id=>{const el=document.getElementById(id);return el?el.checked:false;};
    if(tip==='kesim'){kd.kumas_kod=gv('kf-kumas-kod');kd.kumas_metre=gv('kf-kumas-metre');kd.kumas_kg=gv('kf-kumas-kg');kd.kesim_tarih=gv('kf-kesim-tarih');kd.kesim_operator=gv('kf-kesim-operator');kd.kesim_not=gv('kf-kesim-not');kd.kumas_geldi=gc('kf-kumas-geldi');kd.yikama_yapildi=gc('kf-yikama');
      k.forEach((_,i)=>{if(!kd['kalem_'+i])kd['kalem_'+i]={};const ak=gi('k-kesilen-'+i),af=gi('k-fire_kesim-'+i);if(ak)kd['kalem_'+i].kesilen=(parseInt(kd['kalem_'+i].kesilen||0)||0)+ak;if(af)kd['kalem_'+i].fire_kesim=(parseInt(kd['kalem_'+i].fire_kesim||0)||0)+af;});
    }else if(tip==='dikim'){kd.dikim_bas=gv('kf-dikim-bas');kd.dikim_bit=gv('kf-dikim-bit');kd.dikim_hat=gv('kf-dikim-hat');kd.dikim_operator_sayi=gv('kf-dikim-operator-sayi');kd.dikim_not=gv('kf-dikim-not');
      ['dugme','fermuar','etiket','ipe','diger_ak'].forEach(a=>{kd['ak_'+a+'_gelen']=gi('ak-'+a+'-gelen');kd['ak_'+a+'_kullanilan']=gi('ak-'+a+'-kullanilan');});
      k.forEach((_,i)=>{if(!kd['kalem_'+i])kd['kalem_'+i]={};const ad=gi('k-dikilen-'+i),af=gi('k-fire_dikim-'+i);if(ad)kd['kalem_'+i].dikilen=(parseInt(kd['kalem_'+i].dikilen||0)||0)+ad;if(af)kd['kalem_'+i].fire_dikim=(parseInt(kd['kalem_'+i].fire_dikim||0)||0)+af;});
    }else if(tip==='kk'){kd.kk_tarih=gv('kf-kk-tarih');kd.kk_personel=gv('kf-kk-personel');kd.kk_yontem=gv('kf-kk-yontem');kd.kk_durum=gv('kf-kk-durum');
      k.forEach((_,i)=>{if(!kd['kalem_'+i])kd['kalem_'+i]={};const ak=gi('k-kk_gecen-'+i),at=gi('k-tamir-'+i),ai=gi('k-imha-'+i);if(ak)kd['kalem_'+i].kk_gecen=(parseInt(kd['kalem_'+i].kk_gecen||0)||0)+ak;if(at)kd['kalem_'+i].tamir=(parseInt(kd['kalem_'+i].tamir||0)||0)+at;if(ai)kd['kalem_'+i].imha=(parseInt(kd['kalem_'+i].imha||0)||0)+ai;});
    }else if(tip==='koli'){kd.koli_tarih=gv('kf-koli-tarih');kd.koli_sayi=gv('kf-koli-sayi');kd.koli_basi_adet=gv('kf-koli-basi-adet');kd.koli_kg=gv('kf-koli-kg');kd.koli_not=gv('kf-koli-not');
      k.forEach((_,i)=>{if(!kd['kalem_'+i])kd['kalem_'+i]={};const ak=gi('k-kolide-'+i);if(ak)kd['kalem_'+i].kolide=(parseInt(kd['kalem_'+i].kolide||0)||0)+ak;});
    }else if(tip==='kapama'){kd.kapama_tarih=gv('kf-kapama-tarih');kd.kapama_not=gv('kf-kapama-not');kd.kapama_yapildi=true;}
    let tK=0,tD=0,tKK=0,tKol=0,tH=0;
    k.forEach((_,i)=>{const ki=kd['kalem_'+i]||{};tK+=parseInt(ki.kesilen||0)||0;tD+=parseInt(ki.dikilen||0)||0;tKK+=parseInt(ki.kk_gecen||0)||0;tKol+=parseInt(ki.kolide||0)||0;tH+=(parseInt(ki.iki_kalite||0)||0)+(parseInt(ki.tamir||0)||0)+(parseInt(ki.imha||0)||0);});
    kd.kesim_toplam=tK;kd.dikim_toplam=tD;kd.kk_gecen=tKK;kd.koli_toplam=tKol;kd.hatali_toplam=tH;
    await sbKdSet(girisSeciliId,'KD_KONFEKSIYON',kd);
    girisKd={...kd};showToast('✅ Kaydedildi');renderGirisTab();
  }catch(e){showToast('❌ Hata: '+(e.message||e));}
  btn.disabled=false;
  const lbls={kesim:'💾 KESİM BİLGİLERİNİ KAYDET',dikim:'💾 DİKİM BİLGİLERİNİ KAYDET',kk:'💾 KALİTE KONTROL KAYDET',koli:'💾 KOLİ BİLGİLERİNİ KAYDET',kapama:'💾 KAPAMA BİLGİSİNİ KAYDET'};
  btn.textContent=lbls[tip]||'💾 Kaydet';
}

async function durumGuncelle(){
  if(!girisSeciliId)return;
  const yeni=document.getElementById('kf-durum')?.value;if(!yeni)return;
  try{const{error}=await sb.from('siparisler').update({durum:yeni}).eq('id',girisSeciliId);if(error)throw error;const idx=siparisler.findIndex(s=>s.id==girisSeciliId);if(idx!==-1)siparisler[idx].durum=yeni;showToast('✅ Durum: '+yeni);renderSiparisler();}
  catch(e){showToast('❌ Hata: '+(e.message||e));}
}

async function logLoadSiparis(){
  const id=document.getElementById('log-siparis-sel').value;
  const area=document.getElementById('log-area');
  if(!id){area.innerHTML=`<div class="empty"><div class="icon">📌</div>Yukarıdan sipariş seçin</div>`;return;}
  area.innerHTML='<div class="loading"><div class="spinner"></div></div>';
  try{
    const{data,error}=await sb.from('siparis_akis').select('id,islem,kalem_ad,miktar,notlar,created_at').eq('siparis_id',id).not('islem','in','("KD_KONFEKSIYON","KD_DOKUMA","KD_URUN_AGACI")').order('created_at',{ascending:false}).limit(60);
    if(error)throw error;
    if(!data||!data.length){area.innerHTML=`<div class="empty"><div class="icon">📭</div>İşlem logu bulunamadı</div>`;return;}
    area.innerHTML=`<div class="card"><div class="card-head"><div class="card-dot" style="background:var(--cyan)"></div><div class="card-title">İşlem Geçmişi</div><div class="card-count">${data.length} kayıt</div></div>`+
    data.map(r=>{let not='';try{const p=JSON.parse(r.notlar||'');not=typeof p==='object'?Object.entries(p).slice(0,3).map(([k,v])=>`${k}:${v}`).join(' · '):String(p);}catch{not=r.notlar||'';}
    return `<div class="log-item"><div class="log-islem">${esc(r.islem||'')}${r.kalem_ad&&r.kalem_ad!==r.islem?' · '+esc(r.kalem_ad):''}</div>${not?`<div class="log-not">${esc(String(not).slice(0,120))}</div>`:''}<div class="log-meta">${r.created_at?new Date(r.created_at).toLocaleString('tr-TR'):'—'}</div></div>`;}).join('')+'</div>';
  }catch(e){area.innerHTML=`<div class="empty"><div class="icon">⚠️</div>Hata: ${e.message}</div>`;}
}

async function getKd(id,tip){
  const key=tip+'_'+id;if(kdCache[key]!==undefined)return kdCache[key];
  try{const{data,error}=await sb.from('siparis_akis').select('id,kalem_ad,notlar,created_at').eq('siparis_id',id).eq('islem',tip).order('created_at',{ascending:false}).limit(20);
  if(error)throw error;
  const c=(data||[]).filter(r=>!r.kalem_ad||String(r.kalem_ad)===String(tip)).map(r=>{try{return JSON.parse(r.notlar||'{}');}catch{return null;}}).filter(Boolean);
  const v=c[0]||{};kdCache[key]=v;return v;}catch{return{};}
}

async function sbKdSet(id,tip,kd){
  const json=JSON.stringify(kd);
  const{data:ex}=await sb.from('siparis_akis').select('id').eq('siparis_id',id).eq('islem',tip).eq('kalem_ad',tip).limit(5);
  if(ex&&ex.length>0){const{error}=await sb.from('siparis_akis').update({notlar:json,miktar:0}).eq('siparis_id',id).eq('islem',tip).eq('kalem_ad',tip);if(error)throw error;}
  else{const{error}=await sb.from('siparis_akis').insert([{siparis_id:id,islem:tip,kalem_ad:tip,miktar:0,notlar:json}]);if(error)throw error;}
  kdCache[tip+'_'+id]=kd;
}

function switchTab(t,idx){
  ['siparisler','giris','log'].forEach(id=>{const el=document.getElementById('tab-'+id);if(el)el.style.display=id===t?'':'none';});
  document.querySelectorAll('#main-tab-bar .tab-btn').forEach((b,i)=>b.classList.toggle('active',i===idx));
}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;');}
function showToast(m,d=2500){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),d);}
function showErr(m){document.getElementById('login-screen').innerHTML+=`<div style="margin-top:20px;padding:14px;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);border-radius:12px;color:#ef4444;font-size:13px;max-width:340px;text-align:center">${m}</div>`;}
function parseKalemler(s){try{const c=s.cins;if(!c)return[];const p=typeof c==='string'?JSON.parse(c):c;return Array.isArray(p)?p:[];}catch{return[];}}
function dTag(d){const m={'ÜRETİMDE':'tag-green','DEVAM':'tag-green','BEKLEMEDE':'tag-amber','İPTAL':'tag-red','TAMAMLANDI':'tag-gray'};return`<span class="tag ${m[String(d||'BEKLEMEDE')]||'tag-blue'}">${esc(String(d||'BEKLEMEDE'))}</span>`;}
function dColor(d){const m={'ÜRETİMDE':'#10b981','DEVAM':'#10b981','BEKLEMEDE':'#f59e0b','İPTAL':'#ef4444'};return m[String(d||'')]||'#6366f1';}
function bRow(lbl,val,max,color){const pct=max>0?Math.min(100,Math.round(val/max*100)):0;return`<div class="bar-row"><div class="bar-label">${lbl}</div><div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${color}"></div></div><div class="bar-val" style="color:${color}">${val}</div></div>`;}
function compareSno(a,b){const pa=parseSno(a),pb=parseSno(b);if(pa.year!==pb.year)return pb.year-pa.year;return pb.seq-pa.seq;}
function parseSno(s){const x=String(s||'').toUpperCase();const m=x.match(/(\d{4})\s*\/\s*(\d+)/);return m?{year:+m[1],seq:+m[2]}:{year:0,seq:0};}

window.addEventListener('DOMContentLoaded',()=>{if(!initSB())return;if(tryRestoreSession())startApp();});
</script>
